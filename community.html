<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community · Soundbagd</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>
<body>

<nav class="nav">
  <div class="nav__inner">
    <a href="index.html" class="nav__logo">Sound<span>bagd</span></a>
    <ul class="nav__links">
      <li><a href="index.html">Explore</a></li>
      <li><a href="community.html" class="active">Community</a></li>
      <li><a href="ratings.html">Ratings</a></li>
    </ul>
    <div class="nav__search">
      <svg class="nav__search__icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Search albums, artists…" autocomplete="off">
    </div>
    <div class="nav__actions"></div>
  </div>
</nav>

<!-- Hero -->
<section style="background:var(--bg-card);border-bottom:1px solid var(--border);padding:48px 0 36px">
  <div class="container">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px">
      <div>
        <div class="hero__eyebrow">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Reviewers
        </div>
        <h1 class="hero__title" style="font-size:clamp(1.8rem,3vw,2.4rem);margin-bottom:8px">Find <em>your people.</em></h1>
        <p class="hero__sub" style="font-size:.9rem;max-width:480px">Search for members by username, discover new voices, and follow the people whose taste matches yours.</p>
      </div>
      <div style="display:flex;gap:32px;text-align:center">
        <div>
          <div style="font-size:1.8rem;font-weight:800;color:var(--gold)" id="statMembers">—</div>
          <div class="text-xs muted" style="letter-spacing:.06em;text-transform:uppercase">Members</div>
        </div>
        <div>
          <div style="font-size:1.8rem;font-weight:800;color:var(--gold)" id="statReviews">—</div>
          <div class="text-xs muted" style="letter-spacing:.06em;text-transform:uppercase">Reviews</div>
        </div>
      </div>
    </div>

    <!-- Search bar -->
    <div style="margin-top:28px;max-width:520px;position:relative">
      <svg style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="userSearchInput" type="text" placeholder="Search by username…" autocomplete="off"
        style="width:100%;box-sizing:border-box;padding:12px 16px 12px 42px;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text);font-size:.95rem;outline:none;transition:var(--transition)"
        oninput="onSearchInput(this.value)"
        onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='var(--border)'">
    </div>
  </div>
</section>

<!-- Member list -->
<div class="container" style="padding-top:40px;padding-bottom:100px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <h2 class="h4" id="resultsLabel">All Members</h2>
    <span class="text-xs muted" id="resultsCount"></span>
  </div>
  <div id="memberList"></div>
</div>

<script src="app.js"></script>
<script>
var _searchTimer = null;
var _me = null;

async function initPage() {
  _me = auth.getUser();

  // Stats
  fetch('/api/stats').then(function(r){ return r.json(); }).then(function(s){
    document.getElementById('statMembers').textContent = s.members || 0;
    document.getElementById('statReviews').textContent = s.reviews || 0;
  }).catch(function(){});

  loadUsers('');
}

function onSearchInput(val) {
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(function(){ loadUsers(val.trim()); }, 300);
}

function loadUsers(q) {
  var list = document.getElementById('memberList');
  var label = document.getElementById('resultsLabel');
  var count = document.getElementById('resultsCount');

  label.textContent = q ? 'Results for "' + q + '"' : 'All Members';
  count.textContent = '';
  list.innerHTML = '<p style="color:var(--text-muted);font-size:.875rem;padding:12px 0">Loading…</p>';

  var url = '/api/users/search?q=' + encodeURIComponent(q) + '&limit=50';
  if (_me) url += '&viewer=' + _me.id;

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(users) {
      if (!users || !users.length) {
        list.innerHTML = '<p style="color:var(--text-muted);font-size:.875rem;padding:40px 0;text-align:center">No members found.</p>';
        return;
      }
      count.textContent = users.length + ' member' + (users.length !== 1 ? 's' : '');
      list.innerHTML = '';
      users.forEach(function(u) {
        list.appendChild(makeCard(u));
      });
    })
    .catch(function(err) {
      list.innerHTML = '<p style="color:#e05c5c;font-size:.875rem;padding:12px 0">Error loading members: ' + err.message + '</p>';
    });
}

function makeCard(u) {
  var profileUrl = 'profile.html?u=' + encodeURIComponent(u.username);
  var initials   = (u.initials || u.username.slice(0,2)).toUpperCase();
  var gradient   = u.avatar_gradient || 'linear-gradient(135deg,#d4af37,#7c5cbf)';
  var joinDate   = new Date(u.created_at).toLocaleDateString('en-US', {month:'long', year:'numeric'});
  var isMe       = _me && _me.username === u.username;

  // Outer card
  var card = document.createElement('div');
  card.style.cssText = 'background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color .2s';
  card.onmouseover = function(){ card.style.borderColor = 'var(--gold)'; };
  card.onmouseout  = function(){ card.style.borderColor = 'var(--border)'; };
  card.onclick = function(){ location.href = profileUrl; };

  // Avatar
  var av = document.createElement('div');
  av.style.cssText = 'width:52px;height:52px;border-radius:50%;background:' + gradient + ';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;color:#fff;flex-shrink:0';
  av.textContent = initials;
  card.appendChild(av);

  // Info block
  var info = document.createElement('div');
  info.style.cssText = 'flex:1;min-width:0';

  var nameEl = document.createElement('div');
  nameEl.style.cssText = 'font-weight:700;font-size:.95rem;margin-bottom:2px';
  nameEl.textContent = '@' + u.username;
  info.appendChild(nameEl);

  var meta = document.createElement('div');
  meta.style.cssText = 'font-size:.75rem;color:var(--text-muted);margin-bottom:4px';
  meta.textContent = 'Joined ' + joinDate + ' · ' + (u.review_count || 0) + ' review' + (u.review_count !== 1 ? 's' : '') + ' · ' + (u.follower_count || 0) + ' follower' + (u.follower_count !== 1 ? 's' : '');
  info.appendChild(meta);

  if (u.bio) {
    var bio = document.createElement('div');
    bio.style.cssText = 'font-size:.8rem;color:var(--text-muted);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
    bio.textContent = '“' + u.bio + '”';
    info.appendChild(bio);
  }

  card.appendChild(info);

  // Follow / View button
  var btnWrap = document.createElement('div');
  btnWrap.style.cssText = 'display:flex;gap:8px;flex-shrink:0';
  btnWrap.onclick = function(e){ e.stopPropagation(); };

  if (!isMe) {
    var followBtn = document.createElement('button');
    followBtn.style.cssText = 'padding:7px 16px;border-radius:40px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap';
    if (u.isFollowing) {
      followBtn.textContent = '✓ Following';
      followBtn.style.cssText += ';background:var(--gold);color:#0b0b12;border:none';
    } else {
      followBtn.textContent = '+ Follow';
      followBtn.style.cssText += ';background:none;color:var(--text-muted);border:1px solid rgba(255,255,255,.12)';
    }
    followBtn.onclick = function(){ toggleFollow(u.id, u.username, followBtn, u.isFollowing); u.isFollowing = !u.isFollowing; };
    btnWrap.appendChild(followBtn);
  }

  card.appendChild(btnWrap);
  return card;
}

function toggleFollow(userId, username, btn, currentlyFollowing) {
  if (!_me) { openAuthModal('login'); return; }
  var url = '/api/users/' + encodeURIComponent(username) + '/follow';
  var method = currentlyFollowing ? 'DELETE' : 'POST';
  var token = auth.getToken();
  fetch(url, {
    method: method,
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
  }).then(function(r){ return r.json(); }).then(function(){
    if (currentlyFollowing) {
      btn.textContent = '+ Follow';
      btn.style.background = 'none';
      btn.style.color = 'var(--text-muted)';
      btn.style.border = '1px solid rgba(255,255,255,.12)';
    } else {
      btn.textContent = '✓ Following';
      btn.style.background = 'var(--gold)';
      btn.style.color = '#0b0b12';
      btn.style.border = 'none';
    }
  }).catch(function(err){ alert('Could not update follow: ' + err.message); });
}
</script>
</body>
</html>
